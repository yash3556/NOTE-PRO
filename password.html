<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='icon' type='image/svg+xml' href='favicon.svg'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Edit password</title>
</head>
<body class="password-page">
    <main class="password-wrap">
        <section class="password-card">
            <div class="password-head">
                <span class="pass-badge"><i class="fa fa-shield"></i> Security</span>
                <h1>Change Password</h1>
                <p>Choose a strong password and confirm it to secure your account.</p>
            </div>

            <form class="password-form">
                <label class="password-field" for="newpass">
                    <span>New Password</span>
                    <input type="password" name="password" id="newpass" placeholder="Enter new password" autocomplete="new-password">
                </label>

                <label class="password-field" for="Confirmpass">
                    <span>Confirm Password</span>
                    <input type="password" name="password" id="Confirmpass" placeholder="Confirm new password" autocomplete="new-password">
                </label>

                <button id="submitPass" type="submit">
                    <i class="fa fa-check-circle"></i> Update Password
                </button>
            </form>

            <a class="pass-back-link" href="profile.html">
                <i class="fa fa-arrow-left"></i> Back to Profile
            </a>
        </section>
    </main>
    <script src="notes.js"></script>
</body>
</html>
